name: book_tracker
description: Offline-first personal book catalog.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Database
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking
  dio: ^5.6.0
  connectivity_plus: ^6.0.5

  # Images
  image: ^4.2.0
  image_picker: ^1.1.2

  # Backup / Share
  share_plus: ^12.0.2
  archive: ^3.6.1
  file_picker: ^8.0.0

  # Preferences (theme persistence)
  shared_preferences: ^2.3.1

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.2
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.20.2

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: ClashDisplay
      fonts:
        - asset: assets/fonts/ClashDisplay-Variable.ttf
